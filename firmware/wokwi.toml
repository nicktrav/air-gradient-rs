# Wokwi simulation config. Points at the built ELF (workspace target dir lives at
# the repo root, hence the `../`). Build the firmware first, then:
#   wokwi-cli --timeout 10000 --expect-text "[aq] heartbeat #" firmware
#
# The heartbeat is emitted over the C3's native USB-Serial-JTAG (esp-println's
# `jtag-serial` backend), not a UART. Wokwi only routes that console to the serial
# monitor when the chip part carries `"serialInterface": "USB_SERIAL_JTAG"` and has
# no `$serialMonitor` UART connections - both set in diagram.json. Without that
# attribute the simulation runs but prints nothing (the ROM banner would still need
# a UART wiring to show), which looks exactly like a hung firmware.
[wokwi]
version = 1
elf = "../target/riscv32imc-unknown-none-elf/release/aq-firmware"
firmware = "../target/riscv32imc-unknown-none-elf/release/aq-firmware"
