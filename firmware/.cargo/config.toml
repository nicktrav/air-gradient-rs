# Firmware-scoped cargo config. Only discovered when cargo runs from within
# `firmware/`, which is exactly what we want: `cd firmware && cargo run` builds
# for the MCU and flashes over USB-Serial-JTAG, while the repo root stays host.
#
# Target-specific rustflags live in the repo-root .cargo/config.toml so they are
# shared with `cargo build -p aq-firmware --target ...` invoked from the root.
[build]
target = "riscv32imc-unknown-none-elf"

[target.riscv32imc-unknown-none-elf]
# espflash auto-detects the C3 over the native USB port, flashes, then drops
# into the serial monitor so heartbeat lines appear immediately.
runner = "espflash flash --monitor"
