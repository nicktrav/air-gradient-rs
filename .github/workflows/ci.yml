name: CI

on:
  push:
    branches: [main]
  pull_request:

# A single in-flight run per ref; new pushes cancel stale ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Belt-and-suspenders: GitHub already sets CI=true, which puts insta in
  # "fail on stale, never update" mode. Stated here so the intent is obvious.
  CI: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Nix provides the entire toolchain (rust pinned via rust-toolchain.toml,
      # espflash, esptool, cargo-insta) so CI and `nix develop` are identical.
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      # Cache cargo registry + build artifacts across runs.
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Format
        run: nix develop --command cargo fmt --all --check

      - name: Clippy (host)
        run: nix develop --command cargo clippy --all-targets -- -D warnings

      - name: Clippy (firmware / MCU target)
        run: >-
          nix develop --command
          cargo clippy -p aq-firmware
          --target riscv32imc-unknown-none-elf -- -D warnings

      # CI=true => insta CI mode: a stale snapshot fails instead of updating.
      - name: Host tests
        run: nix develop --command cargo test

      - name: Build firmware (release)
        run: >-
          nix develop --command
          cargo build -p aq-firmware
          --target riscv32imc-unknown-none-elf --release

  # Optional emulator smoke test. Runs only when a Wokwi token is configured, so
  # forks and token-less runs are not blocked. Add WOKWI_CLI_TOKEN in repo
  # secrets (https://wokwi.com/dashboard/ci) to enable it.
  wokwi-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip if no token
        if: env.WOKWI_CLI_TOKEN == ''
        run: echo "WOKWI_CLI_TOKEN not set; skipping emulator smoke test."

      - name: Install Nix
        if: env.WOKWI_CLI_TOKEN != ''
        uses: DeterminateSystems/nix-installer-action@main
      - name: Nix build cache
        if: env.WOKWI_CLI_TOKEN != ''
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build firmware (release)
        if: env.WOKWI_CLI_TOKEN != ''
        run: >-
          nix develop --command
          cargo build -p aq-firmware
          --target riscv32imc-unknown-none-elf --release

      # Asserts the device boots and prints the heartbeat banner. Wokwi cannot
      # model the real sensors, so we only assert serial/boot behaviour.
      - name: Wokwi heartbeat smoke test
        if: env.WOKWI_CLI_TOKEN != ''
        uses: wokwi/wokwi-ci-action@v1
        with:
          token: ${{ secrets.WOKWI_CLI_TOKEN }}
          path: firmware
          timeout: 15000
          expect_text: "[aq] heartbeat #"
